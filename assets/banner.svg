<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <style>
      .star { animation: twinkle 3s infinite alternate; fill: #ffffff; }
      .star-delay-1 { animation-delay: 0.5s; }
      .star-delay-2 { animation-delay: 1.5s; }
      .star-delay-3 { animation-delay: 2s; }
      @keyframes twinkle {
        0% { opacity: 0.2; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1.2); }
      }
      .float { animation: float 4s ease-in-out infinite; }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
    </style>
  </defs>

  <rect width="800" height="250" fill="url(#bg)" rx="15" ry="15"/>

  <!-- Stars -->
  <circle cx="50" cy="50" r="1.5" class="star" />
  <circle cx="150" cy="180" r="2" class="star star-delay-1" />
  <circle cx="300" cy="80" r="1" class="star star-delay-2" />
  <circle cx="650" cy="60" r="2" class="star star-delay-3" />
  <circle cx="750" cy="190" r="1.5" class="star star-delay-1" />
  <circle cx="450" cy="200" r="2" class="star" />
  <circle cx="550" cy="90" r="1.5" class="star star-delay-2" />
  <circle cx="200" cy="40" r="1" class="star star-delay-3" />

  <g class="float" transform="translate(680, 100)">
    <!-- Simple Rocket/Satellite or Drone Graphic -->
    <path d="M0,20 Q10,-10 30,-20 Q50,-10 60,20 L50,40 L10,40 Z" fill="#cbd5e1" />
    <polygon points="10,35 -10,50 15,40" fill="#94a3b8" />
    <polygon points="50,35 70,50 45,40" fill="#94a3b8" />
    <circle cx="30" cy="10" r="8" fill="#1e293b" />
    <!-- Flames -->
    <polygon points="20,40 30,70 40,40" fill="#ef4444">
      <animate attributeName="points" values="20,40 30,70 40,40; 20,40 30,60 40,40; 20,40 30,75 40,40; 20,40 30,70 40,40" dur="0.5s" repeatCount="indefinite" />
    </polygon>
    <polygon points="25,40 30,60 35,40" fill="#facc15">
      <animate attributeName="points" values="25,40 30,60 35,40; 25,40 30,50 35,40; 25,40 30,65 35,40; 25,40 30,60 35,40" dur="0.5s" repeatCount="indefinite" />
    </polygon>
  </g>

  <!-- Text content -->
  <text x="60" y="110" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="url(#textGrad)">Awesome Embedded</text>
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="url(#textGrad)">Flight Softwares</text>
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">A curated list of aerospace &amp; embedded tools</text>
</svg>
